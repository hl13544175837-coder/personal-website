<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CueMe 小伙伴广场</title>
  <style>
    :root {
      --bg: #d8e9ff;
      --panel: #0b1230;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.7);
      --active: #49e6ff;
      --chip: #3056ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px 10px;
      background: radial-gradient(circle at 50% 0%, #eaf2ff 0%, #cfe2ff 45%, #bdd6ff 100%);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    .phone {
      width: min(430px, calc(100vw - 12px));
      height: min(900px, calc(100vh - 20px));
      border-radius: 30px;
      overflow: hidden;
      border: 2px solid #2c3040;
      background:
        radial-gradient(circle at 50% 0%, #1a2f7e 0%, transparent 45%),
        linear-gradient(180deg, #0b1230 0%, #0a1435 100%);
      box-shadow: 0 22px 68px rgba(12, 20, 46, 0.34);
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      color: var(--text);
    }

    .status {
      padding: 12px 16px 3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 700;
    }

    .top {
      padding: 4px 12px 8px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
    }

    .icon-btn {
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 44px;
      font-weight: 800;
      letter-spacing: .5px;
    }

    .tabs {
      display: flex;
      gap: 18px;
      overflow: auto;
      padding: 8px 16px 10px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      white-space: nowrap;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      color: var(--muted);
      font-size: 20px;
      font-weight: 700;
      position: relative;
      padding-bottom: 6px;
    }

    .tab.active {
      color: #a6f9ff;
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, #4de1ff, #6affd9);
    }

    .grid {
      overflow: auto;
      padding: 0 10px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-content: start;
    }

    .card {
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 24px rgba(9, 16, 41, 0.35);
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(13, 24, 58, 0.45);
    }

    .card.tall { height: 396px; }
    .card.short { height: 294px; }

    .cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.06) contrast(1.04);
    }

    .chat-badge {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: #2f4eff;
      display: grid;
      place-items: center;
      color: #cfe0ff;
      font-size: 24px;
      font-weight: 900;
      border: 2px solid rgba(122, 152, 255, 0.6);
    }

    .overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 44px 12px 12px;
      background: linear-gradient(180deg, rgba(8, 15, 39, 0) 0%, rgba(8, 14, 36, 0.84) 58%, rgba(8, 14, 36, 0.95) 100%);
    }

    .overlay p {
      margin: 0;
      color: rgba(255, 255, 255, 0.92);
      font-size: 16px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <section class="phone" aria-label="小伙伴广场">
    <div class="status">
      <span id="clock">15:42</span>
      <span>5G · 100%</span>
    </div>

    <header class="top">
      <button class="icon-btn" id="backBtn" aria-label="返回">←</button>
      <h1 class="title">小伙伴广场</h1>
      <span></span>
    </header>

    <nav class="tabs" aria-label="分类标签">
      <span class="tab">推荐</span>
      <span class="tab">女神</span>
      <span class="tab">男神</span>
      <span class="tab active">游戏动漫</span>
      <span class="tab">影视小说</span>
      <span class="tab">其他</span>
    </nav>

    <main class="grid">
      <article class="card tall" data-role="liushuangyang">
        <img class="cover" src="assets/square-covers/luozheng.png" alt="罗征封面" />
        <div class="chat-badge">◲</div>
        <div class="overlay">
          <p>罗家少家主，在家族内乱中被追害，因祸得福获得神功。</p>
        </div>
      </article>

      <article class="card short" data-role="liuli">
        <img class="cover" src="assets/square-covers/sulingyun.png" alt="苏灵韵封面" />
        <div class="chat-badge">◲</div>
        <div class="overlay">
          <p>容貌倾城，聪慧过人的长公主殿下，待人温和却有锋芒。</p>
        </div>
      </article>

      <article class="card short" data-role="xuexi">
        <img class="cover" src="assets/square-covers/luomei.png" alt="罗嫣封面" />
        <div class="chat-badge">◲</div>
        <div class="overlay">
          <p>温柔坚定的剑修少女，心思细腻，关键时刻极具决断。</p>
        </div>
      </article>

      <article class="card tall" data-role="viktor">
        <img class="cover" src="assets/square-covers/tiangong.png" alt="天穹封面" />
        <div class="chat-badge">◲</div>
        <div class="overlay">
          <p>青云宗十大长老之一，驻颜有术、心机深沉，亦正亦邪。</p>
        </div>
      </article>
    </main>
  </section>

  <script>
    function pad(n) { return String(n).padStart(2, "0"); }
    function tickClock() {
      const now = new Date();
      document.getElementById("clock").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    }
    tickClock();
    window.setInterval(tickClock, 15000);

    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });

    document.querySelectorAll(".card").forEach((card) => {
      card.addEventListener("click", () => {
        const role = card.dataset.role || "cueme";
        window.location.href = `chat.html?role=${encodeURIComponent(role)}`;
      });
    });
  </script>
</body>
</html>
